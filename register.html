<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f7f7f7;
      padding: 40px;
    }
    form {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 1rem;
    }
    button {
      background: #941d57;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background: #222;
    }
  </style>
</head>
<body>
  <form id="register-form">
    <h2>Register</h2>
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="email" name="email" id="reg-email" placeholder="Email" required>
    <input type="text" name="mobile" id="reg-mobile" placeholder="Mobile Number" required>
    <input type="password" id="reg-password" placeholder="Password" required>
    <input type="password" id="reg-confirm-password" placeholder="Confirm Password" required>
    <button type="submit">Register</button>
  </form>

  <script>
    document.getElementById("register-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const name = this.name.value.trim();
      const email = this.email.value.trim();
      const mobile = this.mobile.value.trim();
      const password = document.getElementById("reg-password").value;
      const confirmPassword = document.getElementById("reg-confirm-password").value;

      if (!/^[\w.%+-]+@[\w.-]+\.[a-zA-Z]{2,}$/.test(email)) {
        alert("Please enter a valid email address.");
        return;
      }
      if (!/^[6-9]\d{9}$/.test(mobile)) {
        alert("Please enter a valid 10-digit mobile number.");
        return;
      }
      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }
      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      localStorage.setItem("user", JSON.stringify({ name, email, mobile, password }));
      alert("Registration successful! Please login.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
